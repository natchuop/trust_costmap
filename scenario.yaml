# =============================================================================
# Trust-Costmap Experiment Scenario
# =============================================================================
# Primary purpose:
#   Immediate heatmap-guided fake-obstacle attack against a claim-sensitive
#   planning method.
#
# Compatibility notes:
#   - Existing experiment_manager_node.py consumes the established sections
#     such as experiment, malicious_attack, trust, costmap, claims, robots,
#     planning, action_goals, control, and attack_reconnaissance.
#   - The baseline_suite, termination, metrics, artifacts, rosbag, sensors,
#     dynamic_obstacles, and reproducibility sections prepare the configuration
#     contract for the sweep runner and expanded logging pipeline. Current code
#     may safely ignore fields it does not yet consume.
#   - Keep physical robot, control, map, goal-generation, and attack settings
#     identical across costmap methods. Change only experiment.method or use the
#     launch override costmap_method:=.... Otherwise the comparison becomes a
#     contest between configuration files rather than algorithms.
# =============================================================================

schema_version: 1
scenario_name: room_32_32_4_heatmap_attack_immediate
scenario_family: heatmap_fake_obstacle
scenario_condition: immediate_attack

# Useful for manifests, sweep output, and later dataset indexing.
tags:
  - movingai
  - multi_agent
  - astar
  - fake_obstacle
  - heatmap_attack
  - immediate_attack
  - source_linked

description: >
  Multi-agent MovingAI navigation experiment with an offline topology-only
  reconnaissance heatmap and a runtime malicious reporter. The attacker places
  non-collidable visual fake objects at high-impact heatmap cells and injects
  corresponding occupied-cell claims. All enabled robots receive reproducible
  random goals selected from reachable free cells and follow grid-locked A*
  routes. This scenario is intended to be reused across static,
  hard_threshold, soft_probabilistic, time_decay, trust_fused, and
  source_linked costmap methods by changing only the method override.

# -----------------------------------------------------------------------------
# Core experiment controls
# -----------------------------------------------------------------------------
experiment:
  # Default method for a direct launch. The baseline sweep should override this
  # with costmap_method:=<method> so every method receives the same scenario.
  method: source_linked

  duration_sec: 120
  update_rate_hz: 2.0
  random_seed: 8

  # Human-readable identifiers that can be copied into result manifests.
  study_name: trust_revisable_costmap
  experiment_phase: immediate_attack_validation
  trial_group: room_32_32_4

  # Simulation-time is preferable when /clock is available. The current
  # manager may ignore this until explicit use_sim_time wiring is added.
  use_sim_time: true

  # Warm-up allows ROS, Gazebo, bridges, odometry, and initial plans to settle
  # before measurements are treated as part of the evaluation window.
  warmup_sec: 5.0

  # Cooldown is reserved for final logger flushes and shutdown summaries.
  cooldown_sec: 2.0

# -----------------------------------------------------------------------------
# Baseline and sweep contract
# -----------------------------------------------------------------------------
# This section is intended for the automated baseline sweep runner. It is
# deliberately declarative so the same scenario can produce cleanly comparable
# trials without maintaining six nearly identical YAML files.
baseline_suite:
  enabled: true

  methods:
    - static
    - hard_threshold
    - soft_probabilistic
    - time_decay
    - trust_fused
    - source_linked

  planners:
    - astar

  # The first seed matches experiment.random_seed. Additional seeds provide
  # variance estimates once the pipeline is stable.
  seeds:
    - 8
    - 18
    - 28
    - 38
    - 48

  trials_per_seed: 3

  # Preserve these variables across every compared method.
  controlled_variables:
    - map_name
    - robot_model
    - enabled_robots
    - start_cells
    - action_goal_count
    - action_goal_seed
    - goal_assignment_seed
    - control_parameters
    - experiment_duration_sec
    - attack_schedule
    - heatmap_parameters
    - claim_stream

  # These are the only expected method-level differences.
  independent_variable: costmap_method

  dependent_variables:
    - mission_success
    - completed_goal_visits
    - travel_time_sec
    - geometric_path_length_m
    - objective_path_cost
    - path_inflation_ratio
    - replanning_count
    - planning_time_sec
    - expanded_nodes
    - attack_induced_delay_sec
    - recovery_time_sec
    - false_blockage_persistence_sec
    - malicious_cell_crossings
    - collision_count
    - trust_estimation_error
    - costmap_error

  # A sweep runner can use this order to make logs and plots predictable.
  execution_order:
    - static
    - hard_threshold
    - soft_probabilistic
    - time_decay
    - trust_fused
    - source_linked

  # Continue collecting other trials even if one configuration fails.
  continue_on_trial_failure: true
  fail_suite_on_missing_results: true

# -----------------------------------------------------------------------------
# Launch-level termination contract
# -----------------------------------------------------------------------------
# The updated launch file uses experiment.duration_sec by default. These fields
# prepare more explicit shutdown behavior for a future supervisor.
termination:
  enabled: true
  basis: wall_time
  duration_sec: 120
  shutdown_grace_sec: 2.0

  stop_conditions:
    stop_on_duration: true
    stop_on_primary_robot_failure: false
    stop_on_all_missions_complete: false
    stop_on_collision: false
    stop_on_manager_exit: true
    stop_on_gazebo_exit: true

  flush_logs_before_shutdown: true
  final_summary_timeout_sec: 5.0

# -----------------------------------------------------------------------------
# Runtime malicious fake-obstacle attack
# -----------------------------------------------------------------------------
malicious_attack:
  enabled: true

  robot_ids:
    - malicious_1

  attack_type: heatmap_fake_object

  # Allow initial localization, route publication, and planning to settle.
  start_delay_sec: 20.0

  # Generate one malicious event every 8 seconds.
  report_period_sec: 8.0
  max_attack_events: 8

  # Strength and type of the injected occupancy claim.
  confidence: 0.95
  report_type: occupied

  # Only select heatmap cells that lie on the primary robot's current route.
  placement_policy: route_only

  # Used by route_informed mode; retained for configuration compatibility.
  route_score_multiplier: 2.0
  off_route_score_multiplier: 0.25

  # Create one single-cell fake obstacle per event.
  centers_per_event: 1
  fake_object_radius_cells: 0
  max_claims_per_event: 1

  # Avoid repeatedly selecting the same cell.
  cell_cooldown_sec: 20.0
  avoid_recent_cells: true

  # Keep fake objects far from every enabled agent and mission endpoint.
  agent_exclusion_radius_cells: 5.0
  goal_exclusion_radius_cells: 2.0
  exclude_robot_start_cells: true
  exclude_action_goal_cells: true
  exclude_active_goal_cells: true

  # The object affects the costmap only, not Gazebo collision physics.
  physical_collision: false

  # Gazebo visualization of malicious occupied cells.
  show_visuals: false
  show_gazebo_visuals: false
  visual_shape: cylinder
  visual_radius_m: 0.15
  visual_height_m: 0.12
  visual_z_m: 0.03

  # Intended visual persistence. The manager must implement or retain old
  # active_malicious_cells for this to have an actual runtime effect.
  visual_lifetime_sec: 60.0

  delayed_attack:
    enabled: false
    honest_phase_sec: 60.0
    attack_phase_start_sec: 70.0
    contradiction_start_sec: 90.0

# -----------------------------------------------------------------------------
# Offline topology reconnaissance
# -----------------------------------------------------------------------------
attack_reconnaissance:
  enabled: true

  # Number of route pairs sampled from enabled robot starts and generated goals.
  # Set to 0 to evaluate every available ordered pair.
  route_sample_count: 100

  # Independent deterministic stream for route-pair sampling.
  seed: 21

  # Only high-frequency cells receive expensive block-and-replan evaluation.
  detour_candidate_count: 40

  endpoint_exclusion_radius_cells: 2.0
  unreachable_penalty: 2.0

  route_frequency_weight: 0.40
  detour_weight: 0.45
  chokepoint_weight: 0.15

  # Future generator safeguards and provenance fields.
  require_positive_score_cells: true
  minimum_candidate_score: 0.0
  save_json: true
  save_csv: true
  save_png: true
  copy_artifact_into_run_directory: true

# -----------------------------------------------------------------------------
# Visualization and physical model
# -----------------------------------------------------------------------------
visualization:
  cell_size_m: 0.5
  wall_height_m: 0.6
  wall_z_m: 0.3

  # Retained for compatibility with existing visualization code.
  robot_height_m: 0.25
  robot_z_m: 0.125

robot_model:
  # Shared physical model. Keep identical across all costmap methods.
  length_m: 0.32
  width_m: 0.28
  height_m: 0.18
  body_mass_kg: 1.5

  wheel_radius_m: 0.04
  wheel_width_m: 0.025
  wheel_separation_m: 0.24
  wheel_mass_kg: 0.08
  caster_radius_m: 0.025

  max_linear_acceleration_mps2: 2.0
  max_angular_acceleration_radps2: 4.5
  odom_frequency_hz: 30.0

execution:
  mode: kinematic_planar

  # Allow a larger movement step when callbacks are delayed.
  maximum_step_sec: 0.10

  # Lowering pose sync reduces VM overhead from visualization-only updates.
  gazebo_pose_rate_hz: 4.0

  deterministic: true
  pause_motion_until_visual_sync: true

control:
  enabled: true

  # Faster demonstration movement.
  linear_speed_mps: 5.0
  angular_speed_radps: 16.0

  # Forty updates per second is already plenty for grid-locked movement.
  control_rate_hz: 40.0

  waypoint_tolerance_m: 0.015
  heading_tolerance_rad: 0.025
  slowdown_distance_m: 0.20

  linear_gain: 1.5
  angular_gain: 4.0

  minimum_linear_speed_mps: 0.025
  minimum_angular_speed_radps: 0.10

  odom_timeout_sec: 1.0
  exact_route_following: true

  cross_track_gain: 1.5
  cross_track_tolerance_m: 0.012

  stop_at_every_waypoint: true

  stationary_linear_tolerance_mps: 0.01
  stationary_angular_tolerance_radps: 0.03
  required_stationary_cycles: 3

# -----------------------------------------------------------------------------
# Missions and action goals
# -----------------------------------------------------------------------------
missions:
  goal_mode: sequential

  repeat_goals: true
  max_goal_visits: 0

  goal_tolerance_m: 0.05

  replan_on_goal_reached: true
  replan_from_current_pose: true
  stop_on_completion: true

  # Future evaluation behavior.
  count_primary_robot_only: false
  count_all_enabled_robots: true
  save_goal_visit_timestamps: true

planning:
  planner: astar

  # Recompute A* twice per second. Periodic replans update the internal route
  # without deleting and respawning Gazebo goal/route models.
  replan_period_sec: 0.50
  always_replan: true
  visualize_periodic_replans: false

  # Exact route following currently assumes horizontal and vertical segments.
  allow_diagonal: false

  # Future safety and diagnostics settings.
  require_positive_cell_costs: true
  fail_on_no_path: false
  publish_expanded_node_count: true
  publish_objective_cost: true

  replan_triggers:
    goal_change: true
    claim_revision: true
    costmap_revision: true
    forced_request: true
    periodic_without_change: false

action_goals:
  count: 5
  seed: 8
  min_spacing_cells: 4

  assignment: random_dynamic
  assignment_seed: 41

  avoid_immediate_repeat: true
  avoid_shared_active_goals: true
  return_to_start: false

  # Preserve generated goals in run metadata so every method can be verified as
  # receiving the exact same goal set.
  save_generated_cells: true

  # To replace generated goals with fixed candidates, uncomment and edit:
  # cells:
  #   - [5, 8]
  #   - [12, 18]
  #   - [20, 7]

# -----------------------------------------------------------------------------
# Gazebo visualization
# -----------------------------------------------------------------------------
gazebo_visualization:
  enabled: false
  show_action_goals: false
  show_routes: false
  show_malicious_objects: false
  debug_services: false

  route_width_m: 0.20
  route_height_m: 0.06
  route_z_m: 0.12

  goal_radius_m: 0.16
  goal_height_m: 0.06
  goal_z_m: 0.08

  service_timeout_ms: 3000

  # Future headless runs can disable decorative models while retaining metrics.
  allow_headless: true
  delete_stale_route_models: true
  delete_stale_attack_models: true

# -----------------------------------------------------------------------------
# Robots
# -----------------------------------------------------------------------------
robots:
  - id: benign_1
    role: benign_navigator
    model: simple_box_robot
    start_cell: [1, 1]
    start_yaw: 0.0

    # Primary evaluation endpoint and fallback destination when no generated
    # action goals are available.
    goal_cell: [14, 14]
    enabled: true

    reporting:
      enabled: false
      policy: none

  - id: benign_2
    role: benign_reporter
    model: simple_box_robot
    start_cell: [3, 3]
    start_yaw: 0.0
    goal_cell: null
    enabled: true

    # Sensor-derived reporting is future work. This block establishes the
    # intended behavior without changing the current scripted attack stream.
    reporting:
      enabled: false
      policy: honest
      confidence: 0.90
      benign_error_probability: 0.0

  - id: malicious_1
    role: malicious_reporter
    model: simple_box_robot
    start_cell: [6, 6]
    start_yaw: 0.0
    goal_cell: null
    enabled: true

    reporting:
      enabled: true
      policy: heatmap_fake_obstacle
      confidence: 0.95

# -----------------------------------------------------------------------------
# Evaluation protocol
# -----------------------------------------------------------------------------
evaluation:
  primary_robot: benign_1

  # Reference method for path inflation and attack-induced delay. A future
  # analysis script can either use a matched static trial or compute an offline
  # shortest path from identical start/goal states.
  reference_method: static
  compare_against_clean_condition: true

  measurement_window:
    exclude_warmup: true
    start_sec: 5.0
    end_sec: 120.0

  success_definition:
    require_no_collision: true
    require_at_least_one_goal_visit: true
    require_manager_alive_until_shutdown: true

  path_inflation:
    enabled: true
    denominator: matched_clean_geometric_path_length

  recovery_time:
    enabled: true
    start_event: contradiction_or_trust_drop
    end_condition: primary_route_returns_to_reference_band
    reference_band_ratio: 1.05

  false_blockage_persistence:
    enabled: true
    threshold_probability: 0.65

# -----------------------------------------------------------------------------
# Trust model
# -----------------------------------------------------------------------------
trust:
  default: 0.70

  initial:
    benign_1: 0.70
    benign_2: 0.70
    malicious_1: 0.70

  auto_update_on_contradiction: true
  contradiction_beta: 0.18
  contradiction_eta: 0.05

  minimum: 0.0
  maximum: 1.0

  # Future logger and delayed-attack support.
  save_history: true
  update_on_confirmation: false
  confirmation_alpha: 0.02

# -----------------------------------------------------------------------------
# Costmap parameters shared by all compared methods
# -----------------------------------------------------------------------------
costmap:
  free_cost: 1.0

  # Soft occupancy cost:
  #   free_cost + lambda * probability^k
  lambda: 10.0
  k: 2.0

  # Claim age decay.
  gamma: 0.03

  # Hard-threshold baseline.
  occupancy_threshold: 0.60

  # Occupancy evidence increments.
  l_occ: 1.0
  l_free: -1.0

  # Source-linked proposed method behavior.
  use_time_decay: true
  use_current_trust: true
  proposed_hard_threshold: false

  # Future numeric safeguards.
  minimum_probability: 0.001
  maximum_probability: 0.999
  maximum_finite_cost: 1000000.0

# -----------------------------------------------------------------------------
# Claim stream
# -----------------------------------------------------------------------------
claims:
  # Runtime malicious claims are generated internally. Additional claims may be
  # loaded from scripted_claims or a future external claim file.
  mode: scripted
  claim_file: null

  topic: /map_claims
  queue_depth: 50

  validate_bounds: true
  reject_blocked_static_cells: false
  clamp_confidence: true
  minimum_confidence: 0.0
  maximum_confidence: 1.0

  # Retain source identity so source_linked can revise prior evidence.
  preserve_source_linkage: true
  preserve_metadata: true

scripted_claims: []

# -----------------------------------------------------------------------------
# Future sensing/report-generation contract
# -----------------------------------------------------------------------------
# This section prepares honest and noisy claim generation. The current manager
# does not yet produce sensor-derived claims from it.
sensors:
  enabled: false
  source: gazebo_laser_scan
  field_of_view_deg: 360.0
  maximum_range_m: 3.5
  update_rate_hz: 5.0

  occupancy_report_probability: 1.0
  free_report_probability: 1.0
  benign_error_probability: 0.0

  report_confidence:
    occupied: 0.90
    free: 0.85

# -----------------------------------------------------------------------------
# Future physical dynamic-obstacle contract
# -----------------------------------------------------------------------------
# Keep disabled for the fake-obstacle attack. When enabled in a separate
# scenario, these must become real collidable Gazebo models and should not be
# conflated with malicious visual-only objects.
dynamic_obstacles:
  enabled: false
  schedule: []

  # Example for a future temporary-obstacle scenario:
  # schedule:
  #   - id: temporary_obstacle_1
  #     shape: cylinder
  #     cell: [10, 10]
  #     appear_sec: 20.0
  #     disappear_sec: 70.0
  #     radius_m: 0.18
  #     height_m: 0.50
  #     collidable: true

# -----------------------------------------------------------------------------
# Logging and result artifacts
# -----------------------------------------------------------------------------
logging:
  # The updated launch file creates a run-specific directory under
  # ~/.ros/trust_costmap/runs by default. This relative value remains useful to
  # older code but should not override TRUST_COSTMAP_RUN_DIR when it is set.
  results_dir: results

  use_launch_run_directory: true
  flush_interval_sec: 1.0
  flush_on_shutdown: true

  save_metrics: true
  save_claim_log: true
  save_trust_log: true
  save_attack_log: true
  save_plan_log: true
  save_trajectory_log: true
  save_goal_log: true
  save_costmap_snapshots: false

  formats:
    summary: json
    tabular: csv
    scenario_snapshot: yaml

  filenames:
    summary: summary.json
    plans: plans.csv
    claims: claims.csv
    trust: trust.csv
    attacks: attacks.csv
    trajectories: trajectories.csv
    goals: goals.csv
    events: events.jsonl

  trajectory_sample_rate_hz: 10.0
  costmap_snapshot_period_sec: 5.0

  include:
    ros_time: true
    wall_time: true
    run_id: true
    scenario_name: true
    costmap_method: true
    planner: true
    experiment_seed: true
    trial_index: true

# The launch file already supports rosbag recording through launch arguments.
# This section documents scenario defaults for a future sweep runner.
rosbag:
  enabled_by_default: false
  storage: mcap
  compression: none

  topics:
    - /base_map
    - /planning_costmap
    - /planned_path
    - /plan_status
    - /map_claims
    - /trust_updates
    - /action_goal_updates
    - /clock

  include_robot_topics: true
  include_scans: true
  include_commands: true
  include_odometry: true
  include_agent_routes: true

artifacts:
  copy_scenario: true
  copy_map: true
  copy_heatmap: true
  copy_generated_world: false
  save_launch_manifest: true
  save_effective_parameters: true
  save_git_metadata: true
  save_environment_metadata: true

# -----------------------------------------------------------------------------
# Reproducibility and validation
# -----------------------------------------------------------------------------
reproducibility:
  deterministic: true

  seeds:
    experiment: 8
    action_goal_generation: 8
    action_goal_assignment: 41
    reconnaissance: 21

  require_seed_manifest_match: true
  require_same_action_goals_across_methods: true
  require_same_heatmap_across_methods: true
  require_same_attack_schedule_across_methods: true

  capture:
    git_commit: true
    git_dirty_state: true
    ros_distro: true
    python_version: true
    gazebo_version: true
    hostname: true

validation:
  fail_on_missing_map: true
  fail_on_missing_scenario: true
  fail_on_invalid_robot_cell: true
  fail_on_duplicate_robot_id: true
  fail_on_unknown_malicious_robot: true
  fail_on_missing_heatmap_when_attack_enabled: true
  fail_on_empty_heatmap_candidates: true
  fail_on_heatmap_map_mismatch: true

  warn_on_unimplemented_sections:
    - sensors
    - dynamic_obstacles
    - baseline_suite
    - metrics

# -----------------------------------------------------------------------------
# Metric definitions for the future collector and analysis scripts
# -----------------------------------------------------------------------------
metrics:
  enabled: true

  summary_metrics:
    - mission_success
    - completed_goal_visits
    - elapsed_time_sec
    - travel_time_sec
    - geometric_path_length_m
    - objective_path_cost
    - path_inflation_ratio
    - replanning_count
    - mean_planning_time_sec
    - max_planning_time_sec
    - total_expanded_nodes
    - attack_event_count
    - malicious_claim_count
    - contradiction_count
    - recovery_time_sec
    - false_blockage_persistence_sec
    - collision_count

  per_robot_metrics:
    - completed_goal_visits
    - distance_traveled_m
    - stationary_time_sec
    - route_revisions
    - command_count
    - odometry_timeout_count

  per_attack_metrics:
    - event_index
    - timestamp_sec
    - attacker_id
    - center_row
    - center_col
    - heatmap_score
    - route_membership
    - claims_generated
    - primary_path_cost_before
    - primary_path_cost_after
    - primary_path_length_before
    - primary_path_length_after

  per_plan_metrics:
    - timestamp_sec
    - robot_id
    - start_row
    - start_col
    - goal_row
    - goal_col
    - found
    - geometric_length_cells
    - geometric_length_m
    - objective_cost
    - planning_time_sec
    - expanded_nodes
    - claim_revision
    - route_revision

  # Future statistical-analysis defaults.
  aggregation:
    confidence_level: 0.95
    report_mean: true
    report_median: true
    report_standard_deviation: true
    report_interquartile_range: true
    bootstrap_samples: 10000
