scenario_name: map_independent_random_spawns
description: >
  Map-independent experiment configuration. At launch time, TurtleBot3 Burger
  robots and action goals are placed on unique free cells in the
  largest connected free region of the selected MovingAI map.

experiment:
  method: source_linked
  duration_sec: 120
  update_rate_hz: 2.0

planning:
  # These values are recorded in the generated scenario. The launch arguments
  # with the same names override them for a run.
  planner: astar
  allow_diagonal: false
  action_goal_count: 8
  action_goal_seed: 21

visualization:
  cell_size_m: 0.5
  wall_height_m: 0.6
  wall_z_m: 0.3
  action_goal_size_m: 0.18
  action_goal_height_m: 0.04

robots:
  - id: benign_1
    role: benign_navigator
    model: turtlebot3_burger
    start_cell: null
    goal_cell: null
    start_yaw: 0.0
    enabled: true

  - id: benign_2
    role: benign_reporter
    model: turtlebot3_burger
    start_cell: null
    goal_cell: null
    start_yaw: 0.0
    enabled: true

  - id: malicious_1
    role: malicious_reporter
    model: turtlebot3_burger
    start_cell: null
    goal_cell: null
    start_yaw: 0.0
    enabled: true

evaluation:
  primary_robot: benign_1

trust:
  initial_value: 0.70
  accept_threshold: 0.55
  reward: 0.08
  penalty: 0.18
  contradiction_eta: 0.05

claims:
  mode: scripted
  claim_file: null

logging:
  results_dir: results
  save_metrics: true
  save_claim_log: true
  save_trust_log: true
